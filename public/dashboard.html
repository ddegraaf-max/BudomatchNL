<!DOCTYPE html>
<html lang="nl" translate="no">
<head>
<meta charset="UTF-8">
<meta name="google" content="notranslate">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budomatch — Panel</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Crect width='48' height='48' rx='10' fill='%2313110B'/%3E%3Cpath d='M24 7 L41 24 L34 24 L24 14.5 L14 24 L7 24 Z' fill='%23E3C158'/%3E%3Cpath d='M24 24 l6.5 5.5 -6.5 5.5 -6.5 -5.5 Z' fill='%23E3C158'/%3E%3Crect x='12.5' y='37.5' width='23' height='3.8' rx='1.9' fill='%23E3C158'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#13110B;--bg-2:#1B180F;--panel:#211D12;--gold:#C9A227;--gold-bright:#E3C158;--gold-soft:#E8D9A8;
--cream:#F4EFE3;--muted:#A89C7E;--line:rgba(201,162,39,.18);--red:#C8102E;--green:#3FA66A;--shadow:0 24px 60px rgba(0,0,0,.45)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Manrope',sans-serif;background:var(--bg);color:var(--cream);line-height:1.6;-webkit-font-smoothing:antialiased}
body::before{content:"";position:fixed;inset:0;z-index:-1;background:radial-gradient(1000px 500px at 85% -10%,rgba(201,162,39,.10),transparent 60%),var(--bg)}
h1,h2,h3{font-family:'Marcellus',serif;font-weight:400;letter-spacing:.5px}
a{color:var(--gold-bright);text-decoration:none}
.wrap{max-width:1100px;margin:0 auto;padding:0 24px}
header{position:sticky;top:0;z-index:20;backdrop-filter:blur(12px);background:rgba(19,17,11,.82);border-bottom:1px solid var(--line)}
.nav{display:flex;align-items:center;gap:16px;height:72px}
.logo{display:flex;align-items:center;gap:11px}
.logo svg{width:38px;height:38px}
.logo .word{font-family:'Marcellus',serif;font-size:1.35rem;letter-spacing:1.4px;background:linear-gradient(120deg,#F2DC8C,#D4AF37 55%,#B8901E);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.nav .sp{flex:1}
.pill{display:inline-flex;align-items:center;gap:7px;background:var(--panel);border:1px solid var(--line);border-radius:50px;padding:7px 14px;font-size:.85rem}
.pill b{color:var(--gold-bright)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;cursor:pointer;font-family:'Manrope';font-weight:700;font-size:.92rem;padding:11px 20px;border-radius:50px;transition:.2s}
.btn-gold{background:linear-gradient(145deg,var(--gold-bright),var(--gold));color:#13110B}
.btn-gold:hover{transform:translateY(-1px)}
.btn-ghost{background:transparent;color:var(--gold-soft);border:1px solid var(--line)}
.btn-ghost:hover{border-color:var(--gold)}
.btn-sm{padding:8px 14px;font-size:.85rem}
main{padding:38px 0 80px}
.head{margin-bottom:28px}
.head h1{font-size:2rem;margin-bottom:4px}
.head p{color:var(--muted)}
.grid{display:grid;gap:22px}
@media(min-width:860px){.grid.two{grid-template-columns:1.1fr .9fr}}
.card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:26px;box-shadow:var(--shadow)}
.card h2{font-size:1.3rem;margin-bottom:16px}
label{font-size:.84rem;color:var(--muted);font-weight:600;display:block;margin-bottom:6px}
.inp{width:100%;background:var(--bg-2);border:1px solid var(--line);border-radius:11px;padding:12px 14px;color:var(--cream);font-family:'Manrope';font-size:.96rem;outline:none;transition:.2s;margin-bottom:14px}
.inp:focus{border-color:var(--gold)}
.inp option{background:var(--bg-2)}
.note{background:rgba(63,166,106,.12);border:1px solid rgba(63,166,106,.4);color:#bfe6cf;border-radius:11px;padding:12px 14px;font-size:.9rem;margin-top:10px;display:none}
.note.show{display:block}
.item{border:1px solid var(--line);border-radius:13px;padding:16px 18px;margin-bottom:12px;background:var(--bg-2)}
.item .top{display:flex;align-items:center;gap:10px;margin-bottom:6px;flex-wrap:wrap}
.item .svc{font-weight:700;color:var(--cream)}
.tag{font-size:.72rem;font-weight:700;letter-spacing:.4px;padding:3px 9px;border-radius:50px;border:1px solid var(--line);color:var(--gold-soft)}
.tag.match{background:rgba(201,162,39,.16);border-color:var(--gold);color:var(--gold-bright)}
.tag.green{background:rgba(63,166,106,.16);border-color:var(--green);color:#bfe6cf}
.tag.biz{background:rgba(90,140,200,.16);border-color:rgba(90,140,200,.5);color:#bcd0ec}
.tag.red{background:rgba(200,80,90,.16);border-color:rgba(200,80,90,.5);color:#e2a0aa}
.item .desc{color:var(--muted);font-size:.92rem;margin:6px 0 12px}
.item .meta{font-size:.82rem;color:var(--muted)}
.contact{background:rgba(201,162,39,.08);border:1px solid var(--line);border-radius:10px;padding:11px 14px;font-size:.9rem;margin-top:8px}
.contact b{color:var(--gold-bright)}
.empty{color:var(--muted);text-align:center;padding:30px}
.kpi{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:18px}
.kpi .k{flex:1;min-width:120px;background:var(--bg-2);border:1px solid var(--line);border-radius:13px;padding:14px 16px}
.kpi .n{font-family:'Marcellus';font-size:1.7rem;color:var(--gold-bright);line-height:1}
.kpi .l{font-size:.8rem;color:var(--muted);margin-top:4px}
/* AI assistant */
.assistant .body{height:300px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding:4px 2px 10px}
.msg{max-width:88%;padding:10px 14px;border-radius:14px;font-size:.92rem;line-height:1.5;white-space:pre-wrap}
.msg.bot{align-self:flex-start;background:var(--bg-2);border:1px solid var(--line);border-bottom-left-radius:4px}
.msg.me{align-self:flex-end;background:linear-gradient(145deg,var(--gold-bright),var(--gold));color:#13110B;border-bottom-right-radius:4px;font-weight:500}
.crow{display:flex;gap:8px;margin-top:8px}
.crow input{flex:1;background:var(--bg-2);border:1px solid var(--line);border-radius:50px;padding:11px 15px;color:var(--cream);font-family:'Manrope';outline:none}
.crow button{width:44px;height:44px;flex:none;border-radius:50%;border:none;cursor:pointer;background:linear-gradient(145deg,var(--gold-bright),var(--gold));display:grid;place-items:center;color:#13110B}
.typing span{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--gold);margin:0 2px;animation:bl 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
@keyframes bl{0%,60%,100%{opacity:.3}30%{opacity:1}}
.useit{margin-top:6px;font-size:.8rem;background:none;border:1px dashed var(--line);color:var(--gold-soft);border-radius:50px;padding:5px 12px;cursor:pointer}
.useit:hover{border-color:var(--gold);color:var(--gold-bright)}
.center{min-height:70vh;display:grid;place-items:center;text-align:center}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:var(--panel);border:1px solid var(--gold);color:var(--cream);padding:13px 22px;border-radius:12px;box-shadow:var(--shadow);z-index:100;font-size:.92rem}

.switcher{display:flex;gap:6px;background:var(--bg-2);border:1px solid var(--line);border-radius:50px;padding:5px}
.switcher button{border:none;background:none;color:var(--muted);font-family:'Manrope';font-weight:700;font-size:.82rem;padding:7px 13px;border-radius:50px;cursor:pointer;transition:.2s}
.switcher button.on{background:linear-gradient(145deg,var(--gold-bright),var(--gold));color:#13110B}
.recpt{font-size:.8rem;background:none;border:1px solid var(--line);color:var(--gold-soft);border-radius:50px;padding:5px 12px;cursor:pointer;margin-top:8px}
.recpt:hover{border-color:var(--gold);color:var(--gold-bright)}

.photo-up{display:flex;align-items:center;justify-content:center;gap:10px;text-align:center;border:1.5px dashed var(--line);border-radius:12px;padding:16px;color:var(--muted);cursor:pointer;transition:.2s;margin-bottom:6px}
.photo-up:hover,.photo-up.drag{border-color:var(--gold);color:var(--gold-soft);background:rgba(201,162,39,.06)}
.photo-up svg{width:20px;height:20px;color:var(--gold-bright);flex:none}
.photo-thumbs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.photo-thumbs .th{position:relative;width:74px;height:74px;border-radius:9px;overflow:hidden;border:1px solid var(--line)}
.photo-thumbs .th img{width:100%;height:100%;object-fit:cover;display:block}
.photo-thumbs a.th{cursor:zoom-in}
.photo-thumbs .th button{position:absolute;top:3px;right:3px;width:20px;height:20px;border-radius:50%;border:none;background:rgba(0,0,0,.6);color:#fff;cursor:pointer;font-size:13px;line-height:1;display:grid;place-items:center}

.conv-list{display:flex;flex-direction:column;gap:2px}
.conv{display:flex;align-items:center;gap:12px;padding:12px;border-radius:12px;cursor:pointer;transition:.15s;position:relative}
.conv:hover{background:rgba(201,162,39,.07)}
.conv-av{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--gold),#b8901e);color:#20180a;display:grid;place-items:center;font-weight:700;flex:none}
.conv-main{flex:1;min-width:0}
.conv-top{display:flex;align-items:center;gap:8px}.conv-top b{color:var(--cream)}
.conv-svc{font-size:.78rem;color:var(--gold-soft)}
.conv-last{font-size:.84rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.conv-badge{background:var(--green);color:#fff;min-width:20px;height:20px;border-radius:20px;display:grid;place-items:center;font-size:.72rem;font-weight:700;padding:0 6px;flex:none}
.chat-pane{display:flex;flex-direction:column;height:460px}
.chat-head{display:flex;align-items:center;gap:10px;padding-bottom:10px;border-bottom:1px solid var(--line);margin-bottom:10px}
#chatWith{font-weight:700;color:var(--cream)}
.chat-back{background:none;border:none;color:var(--gold-bright);font-size:1.4rem;cursor:pointer;line-height:1}
.chat-body{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding:4px 2px}
.bubble-row{display:flex}.bubble-row.me{justify-content:flex-end}
.bubble{max-width:78%;padding:9px 13px;border-radius:14px;font-size:.92rem;line-height:1.4;white-space:pre-wrap;word-break:break-word}
.bubble-row.them .bubble{background:var(--panel);border:1px solid var(--line);color:var(--cream);border-bottom-left-radius:4px}
.bubble-row.me .bubble{background:linear-gradient(135deg,var(--gold),#b8901e);color:#20180a;border-bottom-right-radius:4px}
.chat-sys{align-self:center;font-size:.78rem;color:var(--muted);background:rgba(255,255,255,.05);padding:4px 12px;border-radius:20px}
.quote-msg{max-width:82%;background:var(--panel);border:1px solid var(--gold);border-radius:14px;padding:14px}
.qm-h{font-size:.7rem;letter-spacing:.6px;text-transform:uppercase;color:var(--gold-soft)}
.qm-amt{font-family:'Marcellus',serif;font-size:1.6rem;color:var(--gold-bright);margin:2px 0}
.qm-desc{font-size:.88rem;color:var(--cream);margin-bottom:6px}
.qm-status{font-size:.78rem;font-weight:600}
.qm-status.s-sent{color:var(--muted)}.qm-status.s-accepted{color:#7fd6a0}.qm-status.s-declined{color:#e2708a}
.qm-act{display:flex;gap:8px;margin-top:8px}
.chat-compose{display:flex;align-items:center;gap:8px;margin-top:10px;border-top:1px solid var(--line);padding-top:10px}
.chat-compose input{flex:1;background:var(--bg-2,var(--panel));border:1px solid var(--line);border-radius:10px;padding:10px 12px;color:var(--cream);font:inherit}
.chat-send{background:linear-gradient(135deg,var(--gold),#b8901e);border:none;color:#20180a;width:40px;height:40px;border-radius:10px;cursor:pointer;flex:none}
.chat-quote{background:none;border:1px solid var(--gold);color:var(--gold-bright);border-radius:10px;padding:0 12px;height:40px;cursor:pointer;white-space:nowrap;flex:none;font:inherit}
.quote-form{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.quote-form input{flex:1;min-width:120px;background:var(--bg-2,var(--panel));border:1px solid var(--line);border-radius:10px;padding:9px 11px;color:var(--cream);font:inherit}
.btn-ghost{background:none;border:1px solid var(--line);color:var(--cream)}

.seg{display:flex;gap:8px;margin-bottom:6px}
.seg button{flex:1;background:var(--panel);border:1px solid var(--line);color:var(--muted);border-radius:10px;padding:9px;cursor:pointer;font:inherit}
.seg button.on{border-color:var(--gold);color:var(--gold-bright);background:rgba(201,162,39,.1)}
.hint{font-size:.82rem;color:var(--muted);margin:0 0 8px}
.tag.job{background:rgba(63,166,106,.14);border-color:var(--green);color:#bfe6cf}
.tag.orient{background:rgba(232,150,60,.16);border-color:rgba(232,150,60,.55);color:#f2c48a}
.img-msg{max-width:62%}.img-msg img{width:100%;border-radius:12px;cursor:zoom-in;display:block}.im-cap{font-size:.82rem;color:var(--muted);margin-top:4px}
.appt-msg{max-width:82%;background:var(--panel);border:1px solid var(--gold);border-radius:14px;padding:14px}
.ap-when{font-family:'Marcellus',serif;font-size:1.15rem;color:var(--gold-bright);margin:2px 0}
.chat-call{color:var(--gold-bright);display:inline-flex;align-items:center;gap:6px;text-decoration:none;font-size:.85rem}
.chat-ico{background:none;border:1px solid var(--line);color:var(--gold-soft);border-radius:10px;width:40px;height:40px;cursor:pointer;flex:none;display:grid;place-items:center}
.chat-ico:hover{border-color:var(--gold)}

.stars-view{color:var(--gold-bright);font-size:.88rem;letter-spacing:1px}
.stars-view small{color:var(--muted);margin-left:4px;letter-spacing:0}
.rev-btn{background:none;border:1px solid var(--gold);color:var(--gold-bright);border-radius:8px;padding:4px 10px;font-size:.8rem;cursor:pointer}
.rev-panel{border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:10px;background:var(--panel)}
.star-input{display:flex;gap:4px;font-size:1.7rem;color:var(--muted);cursor:pointer;margin-bottom:8px}
.star-input span.on{color:var(--gold-bright)}
.rev-panel input{width:100%;background:var(--bg-2,var(--panel));border:1px solid var(--line);border-radius:8px;padding:8px 10px;color:var(--cream);margin-bottom:8px;font:inherit}

.ptabs{display:flex;flex-wrap:wrap;gap:4px;border-bottom:1px solid var(--line);margin-bottom:22px}
.ptab{background:none;border:none;color:var(--muted);padding:10px 14px;border-radius:10px 10px 0 0;cursor:pointer;font:inherit;font-weight:600;border-bottom:2px solid transparent}
.ptab:hover{color:var(--gold-soft)}
.ptab.on{color:var(--gold-bright);border-bottom-color:var(--gold)}
@media(max-width:640px){.ptabs{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;gap:2px;scrollbar-width:none}.ptabs::-webkit-scrollbar{display:none}.ptab{white-space:nowrap;padding:9px 11px;font-size:.9rem}}
.k.tier-brons .n{color:#cd7f4f}.k.tier-zilver .n{color:#cbd3dc}.k.tier-goud .n{color:var(--gold-bright)}
.faq{border:1px solid var(--line);border-radius:12px;margin-bottom:8px;overflow:hidden}
.faq>button{width:100%;text-align:left;background:none;border:none;color:var(--cream);padding:14px 16px;cursor:pointer;font:inherit;font-weight:600;display:flex;justify-content:space-between;gap:10px}
.faq .a{padding:0 16px 14px;color:var(--muted);font-size:.92rem;display:none}
.faq.open .a{display:block}
.cat-pick{display:flex;flex-wrap:wrap;gap:8px}
.cat-pick label{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:20px;padding:6px 12px;cursor:pointer;font-size:.85rem;color:var(--muted)}
.cat-pick label.on{border-color:var(--gold);color:var(--gold-bright);background:rgba(201,162,39,.08)}
.cat-pick input{display:none}
.prof-logo{width:96px;height:96px;border-radius:14px;object-fit:cover;border:1px solid var(--line);background:var(--panel)}

.pf-head{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;margin-bottom:16px}
.pf-logo-wrap{display:flex;flex-direction:column;gap:8px;align-items:flex-start}
.pf-head-meta{display:flex;flex-direction:column;gap:8px;align-items:flex-end}
.verified-badge{background:rgba(63,166,106,.14);border:1px solid rgba(63,166,106,.45);color:#bfe6cf;border-radius:20px;padding:5px 12px;font-size:.82rem;font-weight:600}
.kvk-box{background:var(--bg-2,var(--panel));border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:16px}
.kvk-row{display:flex;gap:8px;align-items:center}
.kvk-row .inp{margin:0}
.kvk-status{font-size:.85rem;margin-top:8px;min-height:18px;color:var(--muted)}
.pf-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 16px}
@media(max-width:600px){.pf-grid{grid-template-columns:1fr}}
.area-map{height:290px;border-radius:12px;overflow:hidden;border:1px solid var(--line);margin:6px 0}
.area-label{color:var(--gold-soft);font-size:.92rem;margin-bottom:10px}
.leaflet-container{background:#1b180f}

.cfg{background:var(--bg-2,var(--panel));border:1px solid var(--gold);border-radius:14px;padding:16px;margin:6px 0 14px}
.cfg-h{font-family:'Marcellus',serif;color:var(--gold-bright);margin-bottom:10px;font-size:1.05rem}
.cfg-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:10px}
.cfg-grid label{font-size:.85rem;color:var(--gold-soft);display:block}
.cfg-grid input[type=range]{width:100%;accent-color:var(--gold);margin-top:6px}
.cfg-row2{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:10px}
.cfg-row2 label{font-size:.82rem;color:var(--gold-soft);display:block;margin-bottom:3px}
.cfg-row2 input[type=range]{width:100%;accent-color:var(--gold)}
.cfg-preview{background:#141109;border:1px solid var(--line);border-radius:10px;margin:8px 0}
.cfg-preview svg{width:100%;height:200px;display:block}
.cfg-sum{background:rgba(201,162,39,.1);border:1px solid rgba(201,162,39,.3);border-radius:8px;padding:9px 12px;color:var(--gold-soft);font-size:.88rem}
@media(max-width:600px){.cfg-grid{grid-template-columns:1fr}.cfg-row2{grid-template-columns:1fr}}

.cfg-inmeet-btn{background:none;border:1px solid var(--gold);color:var(--gold-bright);border-radius:10px;padding:8px 12px;cursor:pointer;font:inherit;font-size:.86rem;margin:2px 0 10px}
.inmeet{background:#141109;border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:10px}
.inmeet svg{width:100%;max-width:320px;display:block;margin:0 auto 8px}
.inmeet ol{margin:6px 0 6px 18px;padding:0;color:var(--cream);font-size:.88rem;line-height:1.6}
.inmeet .tip{color:#7fd6a0;font-size:.85rem;margin-top:6px}
.inmeet .ex{color:var(--gold-soft);font-size:.85rem;margin-top:8px;border-top:1px solid var(--line);padding-top:8px}
.cfg-extras{display:flex;flex-wrap:wrap;gap:8px;margin:4px 0 10px}
.cfg-extras label{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:20px;padding:6px 11px;cursor:pointer;font-size:.83rem;color:var(--muted)}
.cfg-extras label.on{border-color:var(--gold);color:var(--gold-bright);background:rgba(201,162,39,.08)}
.cfg-extras input{display:none}

.koz-list{margin:8px 0}
.koz-item{display:flex;align-items:center;gap:8px;background:rgba(201,162,39,.08);border:1px solid rgba(201,162,39,.25);border-radius:8px;padding:7px 10px;margin-bottom:6px;font-size:.85rem;color:var(--cream)}
.koz-item button{margin-left:auto;background:none;border:none;color:var(--muted);font-size:1.15rem;cursor:pointer;line-height:1}
.koz-meet{display:flex;align-items:center;gap:8px;font-size:.85rem;color:var(--gold-soft);margin:2px 0 10px;cursor:pointer}
.koz-meet input{accent-color:var(--gold);width:16px;height:16px}
.koz-dim-off{opacity:.4;pointer-events:none}

.tag.gold{background:linear-gradient(90deg,rgba(227,193,88,.18),rgba(201,162,39,.14));border-color:var(--gold);color:var(--gold-bright)}
.resp-box{background:rgba(201,162,39,.06);border:1px solid var(--line);border-radius:10px;padding:10px;margin-top:10px}
.resp-h{font-size:.82rem;color:var(--gold-soft);margin-bottom:6px}
.resp-item{display:flex;align-items:center;gap:8px;font-size:.85rem;color:var(--cream);padding:5px 0}
.edit-form label{font-size:.82rem;color:var(--gold-soft);display:block;margin:6px 0 3px}

const t = k => (T[LANG][k]!=null?T[LANG][k]:k);
function setLang(l){
  LANG=l;
  document.cookie='bm_lang='+l+'; Path=/; Max-Age='+(365*86400)+'; SameSite=Lax';
  $('#lnNL').classList.toggle('on',l==='nl'); $('#lnEN').classList.toggle('on',l==='en');
  if(ME){ applyChrome(); ME.role==='pro'?renderPro():renderCustomer(); }
}
function applyChrome(){
  $('#toSite').textContent=t('toSite'); $('#btnLogout').textContent=t('logout');
  $('#who').innerHTML = ME.role==='pro' ? (t('rolePro')+' · <b>'+(ME.company||ME.name)+'</b>') : (t('roleCust')+' · <b>'+ME.name+'</b>');
}

async function api(url, opt={}){
  const r = await fetch(url, { headers:{'content-type':'application/json'}, ...opt });
  if (r.status === 401) { location.href='/?login=1'; throw new Error('auth'); }
  return r.json();
}
async function logout(){ await fetch('/api/logout',{method:'POST'}); location.href='/'; }

(async function init(){
  $('#lnNL').classList.toggle('on',LANG==='nl'); $('#lnEN').classList.toggle('on',LANG==='en');
  try { ME = (await api('/api/me')).user; } catch { return; }
  applyChrome();
  $('#loading').remove();
  ME.role==='pro' ? renderPro() : renderCustomer();
})();

function sysText(tok){ return ({quote_accepted:t('sysAccepted'),quote_declined:t('sysDeclined'),appt_accepted:t('sysApptAccepted'),appt_declined:t('sysApptDeclined'),review_left:t('sysReview')})[tok]||tok; }

function renderMessages(msgs, me, meId, scroll){

    if(m.type==='system') return `<div class="chat-sys">${htmlesc(sysText(m.text))}</div>`;

      return `<div class="bubble-row ${mine?'me':'them'}"><div class="quote-msg">
        <div class="qm-h">${t('qpLabel')}</div><div class="qm-amt">${money(m.amount)}</div>

      </div></div>`;
    }
    if(m.type==='appointment'){
      const canAct=(meId!==m.fromId && m.status==='sent');
      return `<div class="bubble-row ${mine?'me':'them'}"><div class="appt-msg">
        <div class="qm-h">${t('apLabel')}</div><div class="ap-when">${htmlesc(apWhen(m))}</div>
        ${m.text?`<div class="qm-desc">${htmlesc(m.text)}</div>`:''}
        <div class="qm-status s-${m.status}">${t('qs_'+m.status)}</div>

      </div></div>`;

    }
    return `<div class="bubble-row ${mine?'me':'them'}"><div class="bubble">${htmlesc(m.text)}</div></div>`;

function sendPhoto(files){ const f=(files||[])[0]; if(!f||!CT)return;
  const r=new FileReader(); r.onload=()=>{const img=new Image();img.onload=async()=>{
    const max=1280;let w=img.width,h=img.height; if(w>max||h>max){const sc=Math.min(max/w,max/h);w=Math.round(w*sc);h=Math.round(h*sc);}
    const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);

    await api(`/api/threads/${CT.rid}/${CT.pid}/messages`,{method:'POST',body:JSON.stringify({type:'image',image:data})}); loadMessages(true);
  };img.src=r.result;}; r.readAsDataURL(f);

async function draftReply(btn){ if(!CT)return;

async function matchPros(){
  const category=document.getElementById('mCat').value, city=(document.getElementById('mCity').value||'').trim();
  const el=document.getElementById('prosList'); if(!el)return;
  if(!city){ document.getElementById('mCity').focus(); return; }
  el.innerHTML=`<p class="empty">\u2026</p>`;
  let r; try{ r=await api(`/api/match?category=${encodeURIComponent(category)}&city=${encodeURIComponent(city)}`); }catch(e){ el.innerHTML=`<p class="empty">${t('dirNone')}</p>`; return; }

  el.innerHTML=r.pros.map(p=>`<div class="item"><div class="top">

      <div class="meta">${htmlesc(p.spec||'')}${p.city?' \u00b7 '+htmlesc(p.city):''}${p.distanceKm!=null?' \u00b7 ~'+p.distanceKm+' km':''}</div>

  const r=await api('/api/support',{method:'POST',body:JSON.stringify({subject,message,customerType:(ME&&ME.customerType)||''})});

let DPHOTOS=[];
function addDPhotos(files){
  Array.from(files||[]).filter(f=>f.type&&f.type.indexOf('image/')===0).forEach(f=>{
    if(DPHOTOS.length>=3)return;
    const r=new FileReader();
    r.onload=()=>{const img=new Image();img.onload=()=>{
      if(DPHOTOS.length>=3)return;
      const max=1280;let w=img.width,h=img.height;
      if(w>max||h>max){const sc=Math.min(max/w,max/h);w=Math.round(w*sc);h=Math.round(h*sc);}
      const c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      DPHOTOS.push(c.toDataURL('image/jpeg',0.72));renderDThumbs();
    };img.src=r.result;};
    r.readAsDataURL(f);
  });
  const fi=document.getElementById('cFiles');if(fi)fi.value='';
}
function renderDThumbs(){const el=document.getElementById('cThumbs');if(!el)return;
  el.innerHTML=DPHOTOS.map((d,i)=>'<div class="th"><img src="'+d+'" alt=""><button type="button" aria-label="verwijder" onclick="rmDPhoto('+i+')">\u00d7</button></div>').join('');
  const dz=document.getElementById('cDrop');if(dz)dz.style.display=DPHOTOS.length>=3?'none':'flex';
}
function rmDPhoto(i){DPHOTOS.splice(i,1);renderDThumbs();}

let CFG_TYPE=null, __extType='aanbouw', KOZ_LIST=[];
const SPEC_ALIAS={'Roof window':'Dakraam','Plastering':'Stucwerk','Underfloor heating':'Vloerverwarming','Bathroom':'Badkamerspecialist','Painting':'Schilderwerk','Solar panels':'Zonnepanelen','Insulation':'Isolatie','Kitchen':'Keukenspecialist'};
function configForService(svc){
  if(['Aanbouw','Uitbouw','Opbouw','Extension','Bump-out extension','Storey addition'].includes(svc)) return 'ext';
  if(['Kozijnen','Window frames','Schuifpui','Sliding doors'].includes(svc)) return 'kozijn';
  if(['Dakkapel','Dormer'].includes(svc)) return 'dakkapel';
  if(SPECS[SPEC_ALIAS[svc]||svc]) return 'spec';
  return null;
}
function onServiceChange(){
  const svc=document.getElementById('cService').value; CFG_TYPE=configForService(svc);
  const box=document.getElementById('configBox'); if(!box)return;
  if(CFG_TYPE==='ext'){ __extType=(svc==='Uitbouw'||svc==='Bump-out extension')?'uitbouw':((svc==='Opbouw'||svc==='Storey addition')?'opbouw':'aanbouw'); box.innerHTML=extConfigHtml(); box.style.display='block'; updateExt(); }
  else if(CFG_TYPE==='kozijn'){ box.innerHTML=kozijnConfigHtml(); box.style.display='block'; updateKoz(); }
  else if(CFG_TYPE==='dakkapel'){ box.innerHTML=dakkapelConfigHtml(); box.style.display='block'; updateDak(); }
  else if(CFG_TYPE==='spec'){ box.innerHTML=specConfigHtml(SPEC_ALIAS[svc]||svc); box.style.display='block'; updateSpec(); }
  else { box.innerHTML=''; box.style.display='none'; }
  if(document.getElementById('goldenBox')) loadGolden();
}

function setExtType(tp){ __extType=tp; document.querySelectorAll('#extTypeSeg button').forEach(b=>b.classList.toggle('on', b.dataset.v===tp)); updateExt(); }
function nl1(x){ return Number(x).toFixed(1).replace('.',','); }
function updateExt(){
  const w=parseFloat(document.getElementById('extW').value), d=parseFloat(document.getElementById('extD').value);
  const f=document.getElementById('extF').value, r=document.getElementById('extR').value, u=document.getElementById('extU').value;
  document.getElementById('extWv').textContent=nl1(w); document.getElementById('extDv').textContent=nl1(d);
  const HINT={aanbouw:t('cfgAanbouwHint'),uitbouw:t('cfgUitbouwHint'),opbouw:t('cfgOpbouwHint')}, LBL={aanbouw:t('cfgAanbouw'),uitbouw:t('cfgUitbouw'),opbouw:t('cfgOpbouw')};
  const hint=document.getElementById('extHint'); if(hint)hint.textContent=HINT[__extType];
  drawExtSvg(w,d);
  const m2=nl1(w*d);
  const g=(document.getElementById('extG')||{}).value||'', fun=(document.getElementById('extFun')||{}).value||'';
  const extras=[...document.querySelectorAll('#extExtras input:checked')].map(i=>i.value);
  const lvl=(document.getElementById('extLvl')||{}).value||'';
  const regio=parseInt((document.getElementById('extRegio')||{}).value||'4500',10);
  const area=w*d*parseInt(f,10);
  const value=Math.round(area*regio/500)*500;
  const rv=document.getElementById('extRegioV'); if(rv)rv.textContent=regio.toLocaleString('nl-NL');
  const vv=document.getElementById('extValueV'); if(vv)vv.textContent='+\u20ac'+value.toLocaleString('nl-NL');
  document.getElementById('extSum').textContent=`${LBL[__extType]}: ${nl1(w)} \u00d7 ${nl1(d)} m (${m2} m\u00b2), ${f} ${f==='1'?t('cfgFloor'):t('cfgFloors2')}, ${r.toLowerCase()}, ${u.toLowerCase()}. Gevel: ${g.toLowerCase()}, fundering: ${fun.toLowerCase()}, afwerking: ${lvl}.${extras.length?' Extra\u2019s: '+extras.join(', ').toLowerCase()+'.':''} ${t('cfgValue')}: +\u20ac${value.toLocaleString('nl-NL')}.`;
}
function drawExtSvg(w,d){
  const svg=document.getElementById('extSvg'); if(!svg)return;
  const GRAD=`<defs><linearGradient id="cfgGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#E3C158"/><stop offset="1" stop-color="#b8901e"/></linearGradient></defs>`;
  if(__extType==='opbouw'){
    const S=15, bw=Math.min(w,12)*S, houseH=80, floorH=44;
    const gx=(300-bw)/2, baseY=190, topExisting=baseY-houseH, topNew=topExisting-floorH;
    svg.innerHTML=GRAD
      +`<rect x="${gx}" y="${topExisting}" width="${bw}" height="${houseH}" fill="none" stroke="#8a7a4a" stroke-width="1.5"/>`
      +`<text x="${gx+bw/2}" y="${topExisting+houseH/2+3}" fill="#8a7a4a" font-size="8.5" text-anchor="middle">bestaande woning</text>`
      +`<rect x="${gx}" y="${topNew}" width="${bw}" height="${floorH}" fill="url(#cfgGrad)" stroke="#C9A227" stroke-width="1.6"/>`
      +`<text x="${gx+bw/2}" y="${topNew+floorH/2+3}" fill="#20180a" font-size="9" font-weight="700" text-anchor="middle">opbouw</text>`
      +`<polygon points="${gx-2},${topNew} ${gx+bw+2},${topNew} ${gx+bw/2},${topNew-22}" fill="none" stroke="#8a7a4a" stroke-width="1.3"/>`
      +`<text x="${gx+bw/2}" y="${baseY+14}" fill="#E3C158" font-size="9" text-anchor="middle">${nl1(w)} m</text>`;
    return;
  }
  const S=12, hW=6*S, hD=5*S, eW=Math.min(w,12)*S, eD=Math.min(d,8)*S;
  const totW=Math.max(hW,eW), totH=hD+eD;
  let ox=(300-totW)/2; if(ox<34)ox=34; let oy=(200-totH)/2; if(oy<16)oy=16;
  const houseX=ox+Math.max(0,(eW-hW)/2), extX=ox+Math.max(0,(hW-eW)/2), houseY=oy, extY=oy+hD;
  svg.innerHTML=GRAD+`
    <rect x="${houseX}" y="${houseY}" width="${hW}" height="${hD}" fill="none" stroke="#8a7a4a" stroke-width="1.5" rx="3"/>
    <text x="${houseX+hW/2}" y="${houseY+hD/2+3}" fill="#8a7a4a" font-size="8.5" text-anchor="middle">bestaande woning</text>
    <rect x="${extX}" y="${extY}" width="${eW}" height="${eD}" fill="url(#cfgGrad)" stroke="#C9A227" stroke-width="1.6" rx="3"/>
    <text x="${extX+eW/2}" y="${extY+eD/2+3}" fill="#20180a" font-size="9" font-weight="700" text-anchor="middle">${__extType}</text>
    <text x="${extX+eW/2}" y="${extY+eD+14}" fill="#E3C158" font-size="9" text-anchor="middle">${nl1(w)} m</text>

function reqStatus(q){
  if(q.status==='cancelled') return ['red', t('stReqCancelled')];
  if(q.status==='assigned') return ['gold', t('stReqAssigned')+(q.assignedProName?': '+htmlesc(q.assignedProName):'')];
  return ['green', t('stReqOpen')];
}
function reqCardHtml(q){
  const st=reqStatus(q);
  const responders=(q.status==='open'&&q.responders&&q.responders.length)?`
    <div class="resp-box"><div class="resp-h">${t('reqResponders')} (${q.responders.length}/3)</div>

  return `<div class="item" id="req-${q.id}"><div class="top"><span class="svc">${htmlesc(q.service)}</span>
    <span class="tag ${st[0]}">${st[1]}</span>

    <span class="meta" style="margin-left:auto">${fmtDate(q.createdAt)}</span></div>

      ${q.status!=='cancelled'?`<button class="btn btn-ghost btn-sm" onclick="editReq('${q.id}')">${t('reqEdit')}</button>`:''}

function aiMsg(role,text){
  const d=document.createElement('div'); d.className='msg '+(role==='me'?'me':'bot'); d.textContent=text;
  const wrap=document.createElement('div'); wrap.appendChild(d);
  if(role==='bot' && AI_MODE==='customer'){ const b=document.createElement('button'); b.className='useit'; b.textContent=t('aiUse');
    b.onclick=()=>{ const ta=$('#cDesc'); if(ta){ta.value=text;ta.scrollIntoView({behavior:'smooth',block:'center'});} }; wrap.appendChild(b); }
  $('#aiBody').appendChild(wrap); $('#aiBody').scrollTop=$('#aiBody').scrollHeight;
}
function aiGreet(){ aiMsg('bot', AI_MODE==='pro'?t('aiGreetPro'):t('aiGreet')); }
async function aiSend(){
  const inp=$('#aiInput'); const x=inp.value.trim(); if(!x)return; inp.value='';
  aiMsg('me',x); aiHist.push({role:'user',content:x});
  const typ=document.createElement('div'); typ.className='msg bot'; typ.innerHTML='<span class="typing"><span></span><span></span><span></span></span>';
  $('#aiBody').appendChild(typ); $('#aiBody').scrollTop=$('#aiBody').scrollHeight;
  try{
    const r=await fetch('/api/chat',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({messages:aiHist,lang:LANG,mode:AI_MODE})});
    const d=await r.json(); typ.remove();
    const reply=d.reply||t('aiErr'); aiMsg('bot',reply); aiHist.push({role:'assistant',content:reply});
  }catch(e){ typ.remove(); aiMsg('bot',t('aiErr')); }
}

function downscale(f,max,cb){ const r=new FileReader(); r.onload=()=>{const img=new Image();img.onload=()=>{let w=img.width,h=img.height; if(w>max||h>max){const sc=Math.min(max/w,max/h);w=Math.round(w*sc);h=Math.round(h*sc);} const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);cb(c.toDataURL('image/jpeg',0.72));};img.src=r.result;}; r.readAsDataURL(f); }

async function checkKvk(){
  const num=(document.getElementById('pfKvk').value||'').replace(/\D/g,''); const st=document.getElementById('kvkStatus');
  if(num.length!==8){ st.textContent=t('kvkInvalid'); st.style.color='var(--muted)'; return; }
  st.textContent='…'; st.style.color='var(--muted)';
  let r; try{ r=await api('/api/kvk/'+num); }catch(e){ st.textContent=t('kvkNotFound'); return; }
  if(r.ok){ st.innerHTML='✓ '+t('kvkVerified')+(r.name?' — '+htmlesc(r.name):''); st.style.color='#7fd6a0';
    const _cE=document.getElementById('pfCompany'); if(r.name && _cE && !_cE.value) _cE.value=r.name;
    const _ctE=document.getElementById('pfCity'); if(r.city && _ctE && !_ctE.value) _ctE.value=r.city;
    if(ME) ME.kvkVerified=true; const bn=document.getElementById('proBanner'); if(bn)bn.remove();
  } else if(r.configured===false){ st.textContent=t('kvkNotSet'); st.style.color='var(--muted)'; }
  else if(r.error==='duplicate'){ st.textContent=t('kvkDuplicate'); st.style.color='#e2708a'; }
  else { st.textContent=t('kvkNotFound'); st.style.color='#e2708a'; }
}

let areaMap=null, areaCircle=null, areaMarker=null;
function initAreaMap(){
  const el=document.getElementById('areaMap');
  if(!el || typeof L==='undefined') return;
  areaMap=L.map('areaMap',{scrollWheelZoom:false,attributionControl:true}).setView([52.15,5.3],7);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18,attribution:'\u00a9 OpenStreetMap'}).addTo(areaMap);
  updateAreaMap();
}
async function geocodeCity(city){
  try{ const r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=nl&q=${encodeURIComponent(city)}`,{headers:{Accept:'application/json'}});
    const d=await r.json(); if(d&&d[0]) return [parseFloat(d[0].lat), parseFloat(d[0].lon)]; }catch(e){}
  return null;
}
async function updateAreaMap(){
  const cityEl=document.getElementById('arCity'), radEl=document.getElementById('arRadius'), lbl=document.getElementById('areaLabel');
  if(!cityEl||!radEl) return;
  const city=(cityEl.value||'').trim(), km=parseInt(radEl.value,10)||30;
  if(lbl) lbl.textContent = city ? `\u00b1 ${km} km rondom ${city}` : '';
  if(!areaMap||!city) return;
  const ll=await geocodeCity(city); if(!ll) return;
  if(areaMarker) areaMarker.remove();
  if(areaCircle) areaCircle.remove();
  areaMarker=L.marker(ll).addTo(areaMap);
  areaCircle=L.circle(ll,{radius:km*1000,color:'#C9A227',weight:2,fillColor:'#C9A227',fillOpacity:0.12}).addTo(areaMap);
  areaMap.fitBounds(areaCircle.getBounds(),{padding:[24,24]});
}

function leadHtml(l, creditsLeft){
  const price = l.price || PRICE;
  const contact = l.claimed
    ? `<div class="contact"><b>${l.company?l.company+' · ':''}${l.name}</b> · <a href="tel:${(l.phone||'').replace(/\s/g,'')}">${l.phone||'—'}</a> · ${l.email}</div>`
    : (creditsLeft>0
        ? `<button class="btn btn-gold btn-sm" onclick="claim('${l.id}',this)">${t('freeUnlock')} (${creditsLeft} ${t('over')})</button>`
        : `<button class="btn btn-gold btn-sm" onclick="claim('${l.id}',this)">${t('unlock')} — ${money(price.gross)}${price.orientation?' (50%)':''}</button>`);
  return `<div class="item" id="lead-${l.id}">
    <div class="top"><span class="svc">${l.service}</span>
      ${l.direct?`<span class="tag" style="border-color:var(--green);color:#bfe6cf">${t('tagDirect')}</span>`:''}

      ${l.claimed?`<span class="tag green">${t('unlocked')}</span>`:''}
      ${(!l.claimed && l.photoCount)?`<span class="tag">${l.photoCount} foto${l.photoCount>1?'s':''}</span>`:''}

async function claim(id, btn){
  btn.disabled=true; btn.textContent=t('busy');
  const r = await api('/api/leads/'+id+'/claim', { method:'POST', body:'{}' });
  if (r.error==='kvk_required'){ alert(t('kvkRequiredClaim')); btn.disabled=false; btn.textContent=t('retry'); showProTab('profiel'); return; }
  if (r.ok){ refreshLead(id, r.lead); loadBilling(); reloadKpi(); return; }
  if (r.paymentRequired){
    btn.textContent=t('redirect');
    const c = await api('/api/leads/'+id+'/checkout', { method:'POST', body:'{}' });
    if (c.error==='kvk_required'){ alert(t('kvkRequiredClaim')); btn.disabled=false; btn.textContent=t('retry'); showProTab('profiel'); return; }
    if (c.url){ location.href = c.url; return; }
    if (c.ok){ refreshLead(id, c.lead); loadBilling(); reloadKpi(); return; }
    btn.disabled=false; btn.textContent=t('retry');
  }
}

function toast(msg){ const el=document.createElement('div'); el.className='toast'; el.textContent=msg; document.body.appendChild(el); setTimeout(()=>el.remove(),4500); }
function handleReturn(){
  const q=new URLSearchParams(location.search);
  if(q.get('paid')){ showProTab('leads'); toast(t('paidOk')); let n=0; const iv=setInterval(()=>{ loadLeads(); if(++n>=3)clearInterval(iv); },1500); }
  else if(q.get('cancel')){ toast(t('payCancel')); }
  if(q.has('paid')||q.has('cancel')) history.replaceState({},'','/dashboard.html');
}

let FB_ADMIN_ME=false;
function openSettings(){
  const o=document.getElementById('setOverlay'); if(o)o.style.display='flex';
  renderFeedbackTab();
}
function closeSettings(){ const o=document.getElementById('setOverlay'); if(o)o.style.display='none'; }
function renderFeedbackTab(){
  document.getElementById('setBody').innerHTML=`<h3 style="margin-top:0">${t('setFeedback')}</h3><p style="color:var(--muted);font-size:.88rem">${t('fbIntro')}</p>
    <div class="cfg-row2"><div><label>${t('fbType')}</label><select class="inp" id="fbType"><option value="idee">${t('fbTypeIdea')}</option><option value="verbetering">${t('fbTypeImprove')}</option><option value="probleem">${t('fbTypeProblem')}</option></select></div>
    <div style="grid-column:span 2"><label>${t('fbTitle')}</label><input class="inp" id="fbTitle" maxlength="120"></div></div>
    <label>${t('fbMessage')}</label><textarea class="inp" id="fbMsg" rows="2" maxlength="2000"></textarea>
    <button class="btn btn-gold btn-sm" style="margin-top:8px" onclick="submitFeedback()">${t('fbSubmit')}</button>
    <div id="fbList" style="margin-top:16px"></div>`;
  loadFeedback();
}
async function loadFeedback(){
  let r; try{ r=await api('/api/feedback'); }catch(e){ return; }
  FB_ADMIN_ME=!!r.admin; const el=document.getElementById('fbList'); if(!el)return;
  if(!r.items||!r.items.length){ el.innerHTML=`<p class="empty">${t('fbEmpty')}</p>`; return; }
  const statuses=['nieuw','gepland','bezig','afgerond','afgewezen'];
  const stKey=s=>'stat'+s.charAt(0).toUpperCase()+s.slice(1);
  el.innerHTML=r.items.map(f=>`<div class="fb-item">
    <button class="fb-vote ${f.voted?'on':''}" onclick="voteFb('${f.id}')"><span>\u25B2</span><b>${f.votes}</b></button>
    <div style="flex:1"><div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap"><b>${htmlesc(f.title)}</b><span class="fb-status ${f.status}">${t(stKey(f.status))}</span><span class="tag">${htmlesc(f.type)}</span></div>
      ${f.message?`<div class="meta" style="margin-top:4px">${htmlesc(f.message)}</div>`:''}
      <div class="meta" style="margin-top:4px">${htmlesc(f.name)} \u00b7 ${f.role==='pro'?'vakman':'klant'}</div>
      ${FB_ADMIN_ME?`<select class="inp" style="margin-top:6px;max-width:190px" onchange="setFbStatus('${f.id}',this.value)">${statuses.map(x=>`<option value="${x}" ${x===f.status?'selected':''}>${t(stKey(x))}</option>`).join('')}</select>`:''}
    </div></div>`).join('');
}
async function submitFeedback(){
  const title=document.getElementById('fbTitle').value.trim(); if(!title){document.getElementById('fbTitle').focus();return;}
  await api('/api/feedback',{method:'POST',body:JSON.stringify({type:document.getElementById('fbType').value,title,message:document.getElementById('fbMsg').value})});
  document.getElementById('fbTitle').value=''; document.getElementById('fbMsg').value=''; loadFeedback();
}
async function voteFb(id){ try{ await api('/api/feedback/'+id+'/vote',{method:'POST',body:'{}'}); }catch(e){} loadFeedback(); }
async function setFbStatus(id,status){ try{ await api('/api/feedback/'+id+'/status',{method:'POST',body:JSON.stringify({status})}); }catch(e){} loadFeedback(); }
function renderSecurityTab(targetId){
  SEC_TARGET=targetId||'setBody';
  const b=document.getElementById(SEC_TARGET); if(!b)return;
  if(ME && ME.twofaEnabled){
    b.innerHTML=`<h3 style="margin-top:0">${t('setSecurity')}</h3><p style="color:#7fd6a0">\u2713 ${t('secOn')}</p>
      <p class="meta">${(ME.twofaRecoveryLeft||0)} ${t('secRecoveryLeft')}</p>
      <button class="btn btn-ghost btn-sm" onclick="regen2fa()">${t('secRegen')}</button><div id="regenBox" style="margin-top:8px"></div>
      <hr style="border:none;border-top:1px solid var(--line);margin:16px 0">
      <label>${t('secDisablePrompt')}</label><input class="inp" id="secDisInput" type="password" placeholder="\u2022\u2022\u2022\u2022\u2022\u2022">
      <button class="btn btn-ghost btn-sm" style="margin-top:8px" onclick="disable2fa()">${t('secDisable')}</button><div class="note" id="secNote"></div>`;
  } else {
    b.innerHTML=`<h3 style="margin-top:0">${t('setSecurity')}</h3><p style="color:var(--muted)">${t('secOff')}</p>
      <button class="btn btn-gold btn-sm" onclick="setup2fa()">${t('secEnable')}</button><div id="secSetup" style="margin-top:12px"></div>`;
  }
}
async function setup2fa(){
  let r; try{ r=await api('/api/2fa/setup',{method:'POST',body:'{}'}); }catch(e){ return; }
  document.getElementById('secSetup').innerHTML=`<p>${t('secStep1')}</p>
    <div class="qr-box">${r.qr?`<img src="${r.qr}" alt="QR">`:''}</div>
    <p class="meta">${t('secManual')}</p><div class="secret-code">${r.secret}</div>
    <p style="margin-top:10px">${t('secStep2')}</p>
    <input class="inp" id="sec2faCode" inputmode="numeric" maxlength="6" placeholder="123456">
    <button class="btn btn-gold btn-sm" style="margin-top:8px" onclick="enable2fa()">${t('secConfirm')}</button><div class="note" id="secNote"></div>`;
}
function recoveryHtml(codes){
  const joined=(codes||[]).join('\n');
  return `<div style="margin-top:12px"><div class="cfg-h" style="font-size:.95rem">${t('secRecoveryTitle')}</div>
    <p class="meta">${t('secRecoveryIntro')}</p>
    <div class="secret-code" style="text-align:left;line-height:1.9;letter-spacing:1px">${(codes||[]).map(c=>htmlesc(c)).join('<br>')}</div>
    <button class="btn btn-ghost btn-sm" style="margin-top:8px" onclick="navigator.clipboard&&navigator.clipboard.writeText(this.dataset.c)" data-c="${htmlesc(joined)}">${t('secCopy')}</button></div>`;
}
async function enable2fa(){
  const code=document.getElementById('sec2faCode').value.trim();
  try{ const r=await fetch('/api/2fa/enable',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({code})}); const d=await r.json();
    if(d.ok){ if(ME){ME.twofaEnabled=true;ME.twofaRecoveryLeft=(d.recovery||[]).length;}
      document.getElementById('secSetup').innerHTML=`<p style="color:#7fd6a0">\u2713 ${t('secOn')}</p>`+recoveryHtml(d.recovery||[])+`<button class="btn btn-gold btn-sm" style="margin-top:12px" onclick="renderSecurityTab(SEC_TARGET)">${t('secDone')}</button>`;
    } else { const n=document.getElementById('secNote'); if(n){n.textContent=t('secBadCode');n.classList.add('show');} }
  }catch(e){}
}
function regen2fa(){ document.getElementById('regenBox').innerHTML=`<label>${t('secRegenPrompt')}</label><input class="inp" id="regenInput" type="password"><button class="btn btn-gold btn-sm" style="margin-top:6px" onclick="doRegen()">${t('secRegen')}</button><div id="regenCodes"></div>`; }
async function doRegen(){ const v=document.getElementById('regenInput').value.trim();
  try{ const r=await fetch('/api/2fa/recovery',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({code:v,password:v})}); const d=await r.json();
    if(d.ok){ if(ME)ME.twofaRecoveryLeft=(d.recovery||[]).length; document.getElementById('regenCodes').innerHTML=recoveryHtml(d.recovery||[]); }
    else { document.getElementById('regenCodes').innerHTML=`<p class="meta" style="color:#e2a0aa">${t('secBadCode')}</p>`; }
  }catch(e){}
}
async function disable2fa(){
  const v=document.getElementById('secDisInput').value.trim();
  try{ const r=await fetch('/api/2fa/disable',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({password:v,code:v})}); const d=await r.json();
    if(d.ok){ if(ME)ME.twofaEnabled=false; renderSecurityTab(SEC_TARGET); } else { const n=document.getElementById('secNote'); if(n){n.textContent=t('secBadCode');n.classList.add('show');} }
  }catch(e){}
}
function initFab(){ const f=document.getElementById('fabT'); if(f)f.textContent='Feedback'; }
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',initFab);else initFab();
</script>
<div id="setOverlay" class="set-overlay" style="display:none">
  <div class="set-box">
    <button class="set-x" onclick="closeSettings()" aria-label="Sluiten">&times;</button>
    <div id="setBody"></div>
  </div>
</div>
<button class="fab" onclick="openSettings('feedback')" id="fabBtn">💡 <span id="fabT"></span></button>
</body>
</html>
