<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budomatch — Panel</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Crect width='48' height='48' rx='10' fill='%2313110B'/%3E%3Cpath d='M24 9 L39 24 L33 24 L24 15 L15 24 L9 24 Z' fill='%23E3C158'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#13110B;--bg-2:#1B180F;--panel:#211D12;--gold:#C9A227;--gold-bright:#E3C158;--gold-soft:#E8D9A8;
--cream:#F4EFE3;--muted:#A89C7E;--line:rgba(201,162,39,.18);--red:#C8102E;--green:#3FA66A;--shadow:0 24px 60px rgba(0,0,0,.45)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Manrope',sans-serif;background:var(--bg);color:var(--cream);line-height:1.6;-webkit-font-smoothing:antialiased}
body::before{content:"";position:fixed;inset:0;z-index:-1;background:radial-gradient(1000px 500px at 85% -10%,rgba(201,162,39,.10),transparent 60%),var(--bg)}
h1,h2,h3{font-family:'Marcellus',serif;font-weight:400;letter-spacing:.5px}
a{color:var(--gold-bright);text-decoration:none}
.wrap{max-width:1100px;margin:0 auto;padding:0 24px}
header{position:sticky;top:0;z-index:20;backdrop-filter:blur(12px);background:rgba(19,17,11,.82);border-bottom:1px solid var(--line)}
.nav{display:flex;align-items:center;gap:16px;height:72px}
.logo{display:flex;align-items:center;gap:11px}
.logo svg{width:38px;height:38px}
.logo .word{font-family:'Marcellus',serif;font-size:1.35rem;letter-spacing:1.4px;background:linear-gradient(120deg,#F2DC8C,#D4AF37 55%,#B8901E);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.nav .sp{flex:1}
.pill{display:inline-flex;align-items:center;gap:7px;background:var(--panel);border:1px solid var(--line);border-radius:50px;padding:7px 14px;font-size:.85rem}
.pill b{color:var(--gold-bright)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;cursor:pointer;font-family:'Manrope';font-weight:700;font-size:.92rem;padding:11px 20px;border-radius:50px;transition:.2s}
.btn-gold{background:linear-gradient(145deg,var(--gold-bright),var(--gold));color:#13110B}
.btn-gold:hover{transform:translateY(-1px)}
.btn-ghost{background:transparent;color:var(--gold-soft);border:1px solid var(--line)}
.btn-ghost:hover{border-color:var(--gold)}
.btn-sm{padding:8px 14px;font-size:.85rem}
main{padding:38px 0 80px}
.head{margin-bottom:28px}
.head h1{font-size:2rem;margin-bottom:4px}
.head p{color:var(--muted)}
.grid{display:grid;gap:22px}
@media(min-width:860px){.grid.two{grid-template-columns:1.1fr .9fr}}
.card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:26px;box-shadow:var(--shadow)}
.card h2{font-size:1.3rem;margin-bottom:16px}
label{font-size:.84rem;color:var(--muted);font-weight:600;display:block;margin-bottom:6px}
.inp{width:100%;background:var(--bg-2);border:1px solid var(--line);border-radius:11px;padding:12px 14px;color:var(--cream);font-family:'Manrope';font-size:.96rem;outline:none;transition:.2s;margin-bottom:14px}
.inp:focus{border-color:var(--gold)}
.inp option{background:var(--bg-2)}
.note{background:rgba(63,166,106,.12);border:1px solid rgba(63,166,106,.4);color:#bfe6cf;border-radius:11px;padding:12px 14px;font-size:.9rem;margin-top:10px;display:none}
.note.show{display:block}
.item{border:1px solid var(--line);border-radius:13px;padding:16px 18px;margin-bottom:12px;background:var(--bg-2)}
.item .top{display:flex;align-items:center;gap:10px;margin-bottom:6px;flex-wrap:wrap}
.item .svc{font-weight:700;color:var(--cream)}
.tag{font-size:.72rem;font-weight:700;letter-spacing:.4px;padding:3px 9px;border-radius:50px;border:1px solid var(--line);color:var(--gold-soft)}
.tag.match{background:rgba(201,162,39,.16);border-color:var(--gold);color:var(--gold-bright)}
.tag.green{background:rgba(63,166,106,.16);border-color:var(--green);color:#bfe6cf}
.item .desc{color:var(--muted);font-size:.92rem;margin:6px 0 12px}
.item .meta{font-size:.82rem;color:var(--muted)}
.contact{background:rgba(201,162,39,.08);border:1px solid var(--line);border-radius:10px;padding:11px 14px;font-size:.9rem;margin-top:8px}
.contact b{color:var(--gold-bright)}
.empty{color:var(--muted);text-align:center;padding:30px}
.kpi{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:18px}
.kpi .k{flex:1;min-width:120px;background:var(--bg-2);border:1px solid var(--line);border-radius:13px;padding:14px 16px}
.kpi .n{font-family:'Marcellus';font-size:1.7rem;color:var(--gold-bright);line-height:1}
.kpi .l{font-size:.8rem;color:var(--muted);margin-top:4px}
/* AI assistant */
.assistant .body{height:300px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding:4px 2px 10px}
.msg{max-width:88%;padding:10px 14px;border-radius:14px;font-size:.92rem;line-height:1.5;white-space:pre-wrap}
.msg.bot{align-self:flex-start;background:var(--bg-2);border:1px solid var(--line);border-bottom-left-radius:4px}
.msg.me{align-self:flex-end;background:linear-gradient(145deg,var(--gold-bright),var(--gold));color:#13110B;border-bottom-right-radius:4px;font-weight:500}
.crow{display:flex;gap:8px;margin-top:8px}
.crow input{flex:1;background:var(--bg-2);border:1px solid var(--line);border-radius:50px;padding:11px 15px;color:var(--cream);font-family:'Manrope';outline:none}
.crow button{width:44px;height:44px;flex:none;border-radius:50%;border:none;cursor:pointer;background:linear-gradient(145deg,var(--gold-bright),var(--gold));display:grid;place-items:center;color:#13110B}
.typing span{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--gold);margin:0 2px;animation:bl 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
@keyframes bl{0%,60%,100%{opacity:.3}30%{opacity:1}}
.useit{margin-top:6px;font-size:.8rem;background:none;border:1px dashed var(--line);color:var(--gold-soft);border-radius:50px;padding:5px 12px;cursor:pointer}
.useit:hover{border-color:var(--gold);color:var(--gold-bright)}
.center{min-height:70vh;display:grid;place-items:center;text-align:center}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:var(--panel);border:1px solid var(--gold);color:var(--cream);padding:13px 22px;border-radius:12px;box-shadow:var(--shadow);z-index:100;font-size:.92rem}

.switcher{display:flex;gap:6px;background:var(--bg-2);border:1px solid var(--line);border-radius:50px;padding:5px}
.switcher button{border:none;background:none;color:var(--muted);font-family:'Manrope';font-weight:700;font-size:.82rem;padding:7px 13px;border-radius:50px;cursor:pointer;transition:.2s}
.switcher button.on{background:linear-gradient(145deg,var(--gold-bright),var(--gold));color:#13110B}
.recpt{font-size:.8rem;background:none;border:1px solid var(--line);color:var(--gold-soft);border-radius:50px;padding:5px 12px;cursor:pointer;margin-top:8px}
.recpt:hover{border-color:var(--gold);color:var(--gold-bright)}

.photo-up{display:flex;align-items:center;justify-content:center;gap:10px;text-align:center;border:1.5px dashed var(--line);border-radius:12px;padding:16px;color:var(--muted);cursor:pointer;transition:.2s;margin-bottom:6px}
.photo-up:hover,.photo-up.drag{border-color:var(--gold);color:var(--gold-soft);background:rgba(201,162,39,.06)}
.photo-up svg{width:20px;height:20px;color:var(--gold-bright);flex:none}
.photo-thumbs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.photo-thumbs .th{position:relative;width:74px;height:74px;border-radius:9px;overflow:hidden;border:1px solid var(--line)}
.photo-thumbs .th img{width:100%;height:100%;object-fit:cover;display:block}
.photo-thumbs a.th{cursor:zoom-in}
.photo-thumbs .th button{position:absolute;top:3px;right:3px;width:20px;height:20px;border-radius:50%;border:none;background:rgba(0,0,0,.6);color:#fff;cursor:pointer;font-size:13px;line-height:1;display:grid;place-items:center}
</style>

</head>
<body>
<header><div class="wrap nav">
  <a href="/" class="logo"><svg viewBox="0 0 48 48"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#F2DC8C"/><stop offset=".55" stop-color="#D4AF37"/><stop offset="1" stop-color="#A87D1B"/></linearGradient></defs><circle cx="24" cy="24" r="22" fill="none" stroke="url(#g)" stroke-width="1.6" opacity=".55"/><path d="M24 9 L39 24 L33 24 L24 15 L15 24 L9 24 Z" fill="url(#g)"/><path d="M24 19.5 l5 4.5 -5 4.5 -5 -4.5 Z" fill="url(#g)"/><rect x="14" y="32.5" width="20" height="3.4" rx="1.7" fill="url(#g)"/></svg><span class="word">Budomatch</span></a>

<script>
const $ = s => document.querySelector(s);
const money = n => '€ ' + Number(n).toFixed(2).replace('.', ',');
let LANG=(document.cookie.match(/(?:^|; )bm_lang=(nl|en)/)||[])[1]||'nl';
const fmtDate = ms => new Date(ms).toLocaleDateString(LANG==='nl'?'nl-NL':'en-GB', { day:'numeric', month:'short', year:'numeric' });
let ME = null;

const SELLER = { name:'Budomatch DANIËL DE GRAAF', addr:'15, 09-550 Białka, Polska', nip:'7010869430', regon:'381430120', email:'info@budomatch.pl' };

const T = {
  en: {
    toSite:'Site', logout:'Log out', loading:'Loading…',
    roleCust:'Customer', rolePro:'Tradesman',
    cWelcome:'Welcome', cIntro:'Post a job for free — tradesmen will send you no-obligation quotes.',
    cNew:'Post a new job', cService:'Service', cZip:'City / postcode', cZipPh:'e.g. 1011 AB Amsterdam',

    cPhotos:'Photos (optional, max 3)', cPhotosHint:'Tap or drag to add photos',
    cPost:'Post for free', cNote:'Your job is live. Tradesmen can now respond.',
    aiTitle:'AI assistant', aiIntro:'Let me help you describe the job clearly.',

    aiPh:'Type here…', aiUse:'Use as description ↓', aiErr:'Sorry, something went wrong.',
    myReq:'My jobs', myEmpty:'You have not posted any jobs yet.', reaction:'response', reactions:'responses',
    pWelcome:'Welcome', pIntro:'Available jobs near you. Unlock a lead to see the contact details.',
    kFree:'free jobs left', kUsed:'unlocked total', kPrice:'per lead after 10 free (VAT reverse-charged)',
    leads:'Available leads', leadsEmpty:'There are no open jobs yet.',
    match:'matches you', unlocked:'unlocked',
    freeUnlock:'Unlock for free', unlock:'Unlock', incl:'reverse charge', over:'left',

    paidOk:'Payment successful — the lead will be unlocked.', payCancel:'Payment cancelled.',

    rcNet:'Net', rcVat:'VAT (reverse charge, 0%)', rcGross:'Total', rcDate:'Date', rcPrint:'Print / save as PDF', rcNip:'VAT number',
  },
  nl: {

    cNew:'Nieuwe aanvraag plaatsen', cService:'Dienst', cZip:'Plaats / postcode', cZipPh:'bijv. 1011 AB Amsterdam',
    cPhone:'Telefoon (zien vakmensen pas na ontgrendeling)', cPhonePh:'+31 6 12345678',
    cDesc:'Omschrijving van de klus', cDescPh:'Beschrijf wat er moet gebeuren, omvang, gewenste termijn…',
    cPhotos:'Foto\'s (optioneel, max 3)', cPhotosHint:'Tik of sleep om foto\'s toe te voegen',
    cPost:'Gratis plaatsen', cNote:'Je aanvraag staat live. Vakmensen kunnen nu reageren.',
    aiTitle:'AI-assistent', aiIntro:'Laat me je helpen de klus scherp te omschrijven.',
    aiGreet:'Hoi! Vertel kort wat je wilt laten doen, dan help ik je tot een heldere klusomschrijving te komen. Bijvoorbeeld: "badkamer renoveren" of "zonnepanelen op schuin dak".',
    aiPh:'Typ hier…', aiUse:'Gebruik als omschrijving ↓', aiErr:'Sorry, er ging iets mis.',
    myReq:'Mijn aanvragen', myEmpty:'Je hebt nog geen aanvragen geplaatst.', reaction:'reactie', reactions:'reacties',
    pWelcome:'Welkom', pIntro:'Beschikbare aanvragen bij jou in de buurt. Ontgrendel een lead om de contactgegevens te zien.',
    kFree:'gratis aanvragen over', kUsed:'ontgrendeld totaal', kPrice:'per lead na 10 gratis (btw verlegd)',
    leads:'Beschikbare leads', leadsEmpty:'Er staan nog geen open aanvragen.',
    match:'past bij jou', unlocked:'ontgrendeld',
    freeUnlock:'Gratis ontgrendelen', unlock:'Ontgrendelen', incl:'btw verlegd', over:'over',
    busy:'Bezig…', redirect:'Doorsturen naar betaling…', retry:'Opnieuw proberen',
    billing:'Facturatie', bFree:'gratis over', bPaid:'betaald totaal', bNone:'Nog geen ontgrendelingen.',
    free:'gratis', exclVat:'netto {net} · btw verlegd', receipt:'Factuur',
    paidOk:'Betaling gelukt — de lead wordt ontgrendeld.', payCancel:'Betaling geannuleerd.',
    rcTitle:'Factuur', rcSeller:'Verkoper', rcBuyer:'Koper', rcDesc:'Omschrijving', rcLead:'Ontgrendeling lead',
    rcNet:'Netto', rcVat:'Btw (verlegd, 0%)', rcGross:'Totaal', rcDate:'Datum', rcPrint:'Afdrukken / opslaan als PDF', rcNip:'Btw-nummer',
  }
};
const t = k => (T[LANG][k]!=null?T[LANG][k]:k);
function setLang(l){
  LANG=l;
  document.cookie='bm_lang='+l+'; Path=/; Max-Age='+(365*86400)+'; SameSite=Lax';
  $('#lnNL').classList.toggle('on',l==='nl'); $('#lnEN').classList.toggle('on',l==='en');
  if(ME){ applyChrome(); ME.role==='pro'?renderPro():renderCustomer(); }
}
function applyChrome(){
  $('#toSite').textContent=t('toSite'); $('#btnLogout').textContent=t('logout');
  $('#who').innerHTML = ME.role==='pro' ? (t('rolePro')+' · <b>'+(ME.company||ME.name)+'</b>') : (t('roleCust')+' · <b>'+ME.name+'</b>');
}

async function api(url, opt={}){
  const r = await fetch(url, { headers:{'content-type':'application/json'}, ...opt });
  if (r.status === 401) { location.href='/?login=1'; throw new Error('auth'); }
  return r.json();
}
async function logout(){ await fetch('/api/logout',{method:'POST'}); location.href='/'; }

(async function init(){
  $('#lnNL').classList.toggle('on',LANG==='nl'); $('#lnEN').classList.toggle('on',LANG==='en');
  try { ME = (await api('/api/me')).user; } catch { return; }
  applyChrome();
  $('#loading').remove();
  ME.role==='pro' ? renderPro() : renderCustomer();
})();

const CATS_EN = "Extension,Air conditioning,Architect,Asbestos removal,Bathroom,Paving,Boiler (CH),Roofing,Dormer,Roof window,Electrician,Garage door,Facade cleaning,Glazing,Fencing,Burglary protection,Insulation,Kitchen,Window frames,EV charging,Plumber,Pest control,Roller shutters,Painting,Sliding doors,Conservatory,Plastering,Tiling,Home battery,Stairs,Landscaping,Garden maintenance,Ventilation,Renovation,Flooring,Underfloor heating,Damp proofing,Heat pump,Wellness & sauna,Solar panels,Awnings & sun protection".split(',');
const CATS_NL = "Aanbouw,Airco,Architect,Asbest verwijderen,Badkamerspecialist,Bestraten,Cv-ketel,Dakbedekking,Dakkapel,Dakraam,Elektricien,Garagedeur,Gevelreiniging,Glas,Hekwerken,Inbraakbeveiliging,Isolatie,Keukenspecialist,Kozijnen,Laadpalen,Loodgieter,Ongediertebestrijding,Rolluiken,Schilderwerk,Schuifpui,Serre,Stucwerk,Tegels zetten,Thuisbatterij,Trap,Tuinaanleg,Tuinonderhoud,Ventilatie,Verbouwing,Vloeren,Vloerverwarming,Vochtbestrijding,Warmtepomp,Wellness,Zonnepanelen,Zonwering".split(',');
const cats = () => LANG==='nl'?CATS_NL:CATS_EN;

/* ============ KLANT / KLIENT ============ */
function renderCustomer(){
  $('#main').innerHTML = `
    <div class="head"><h1>${t('cWelcome')}, ${ME.name}</h1><p>${t('cIntro')}</p></div>
    <div class="grid two">
      <div class="card">
        <h2>${t('cNew')}</h2>
        <label>${t('cService')}</label>
        <select class="inp" id="cService">${cats().map(c=>`<option>${c}</option>`).join('')}</select>
        <label>${t('cZip')}</label><input class="inp" id="cZip" placeholder="${t('cZipPh')}">
        <label>${t('cPhone')}</label><input class="inp" id="cPhone" placeholder="${t('cPhonePh')}">
        <label>${t('cDesc')}</label>
        <textarea class="inp" id="cDesc" rows="5" placeholder="${t('cDescPh')}"></textarea>
        <label>${t('cPhotos')}</label>
        <div class="photo-up" id="cDrop" onclick="document.getElementById('cFiles').click()" ondragover="event.preventDefault();this.classList.add('drag')" ondragleave="this.classList.remove('drag')" ondrop="event.preventDefault();this.classList.remove('drag');addDPhotos(event.dataTransfer.files)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 9l5-5 5 5"/><path d="M12 4v12"/></svg>
          <span>${t('cPhotosHint')}</span>
        </div>
        <input type="file" id="cFiles" accept="image/*" multiple hidden onchange="addDPhotos(this.files)">
        <div class="photo-thumbs" id="cThumbs"></div>
        <button class="btn btn-gold" style="width:100%" onclick="postRequest()">${t('cPost')}</button>
        <div class="note" id="cNote">${t('cNote')}</div>
      </div>
      <div class="card assistant">
        <h2>${t('aiTitle')}</h2>
        <p style="color:var(--muted);font-size:.88rem;margin-bottom:10px">${t('aiIntro')}</p>
        <div class="body" id="aiBody"></div>
        <div class="crow">
          <input id="aiInput" placeholder="${t('aiPh')}" onkeydown="if(event.key==='Enter')aiSend()">
          <button onclick="aiSend()" aria-label="Send"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13"/><path d="M22 2 15 22l-4-9-9-4z"/></svg></button>
        </div>
      </div>
    </div>
    <div class="card" style="margin-top:22px"><h2>${t('myReq')}</h2><div id="myReqs"></div></div>`;
  aiHist=[]; aiGreet(); loadMyRequests();
}
let DPHOTOS=[];
function addDPhotos(files){
  Array.from(files||[]).filter(f=>f.type&&f.type.indexOf('image/')===0).forEach(f=>{
    if(DPHOTOS.length>=3)return;
    const r=new FileReader();
    r.onload=()=>{const img=new Image();img.onload=()=>{
      if(DPHOTOS.length>=3)return;
      const max=1280;let w=img.width,h=img.height;
      if(w>max||h>max){const sc=Math.min(max/w,max/h);w=Math.round(w*sc);h=Math.round(h*sc);}
      const c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      DPHOTOS.push(c.toDataURL('image/jpeg',0.72));renderDThumbs();
    };img.src=r.result;};
    r.readAsDataURL(f);
  });
  const fi=document.getElementById('cFiles');if(fi)fi.value='';
}
function renderDThumbs(){const el=document.getElementById('cThumbs');if(!el)return;
  el.innerHTML=DPHOTOS.map((d,i)=>'<div class="th"><img src="'+d+'" alt=""><button type="button" aria-label="verwijder" onclick="rmDPhoto('+i+')">\u00d7</button></div>').join('');
  const dz=document.getElementById('cDrop');if(dz)dz.style.display=DPHOTOS.length>=3?'none':'flex';
}
function rmDPhoto(i){DPHOTOS.splice(i,1);renderDThumbs();}
async function postRequest(){
  const body = { service:$('#cService').value, zip:$('#cZip').value, phone:$('#cPhone').value, description:$('#cDesc').value, photos:DPHOTOS, lang:LANG };
  if (!body.description.trim()) { $('#cDesc').focus(); return; }
  const r = await api('/api/requests', { method:'POST', body:JSON.stringify(body) });
  if (r.request){ $('#cNote').classList.add('show'); $('#cDesc').value=''; $('#cZip').value=''; $('#cPhone').value=''; DPHOTOS=[]; renderDThumbs(); loadMyRequests(); }
}
async function loadMyRequests(){
  const r = await api('/api/requests/mine'); const el = $('#myReqs');
  if (!r.requests.length){ el.innerHTML = `<p class="empty">${t('myEmpty')}</p>`; return; }
  el.innerHTML = r.requests.map(q=>`
    <div class="item"><div class="top"><span class="svc">${q.service}</span>
      <span class="tag green">${q.claims} ${q.claims===1?t('reaction'):t('reactions')}</span>
      <span class="meta" style="margin-left:auto">${fmtDate(q.createdAt)}</span></div>
      <div class="desc">${q.description}</div><div class="meta">${q.zip||''}</div></div>`).join('');
}
let aiHist = [];
function aiMsg(role,text){
  const d=document.createElement('div'); d.className='msg '+(role==='me'?'me':'bot'); d.textContent=text;
  const wrap=document.createElement('div'); wrap.appendChild(d);
  if(role==='bot'){ const b=document.createElement('button'); b.className='useit'; b.textContent=t('aiUse');
    b.onclick=()=>{ const ta=$('#cDesc'); if(ta){ta.value=text;ta.scrollIntoView({behavior:'smooth',block:'center'});} }; wrap.appendChild(b); }
  $('#aiBody').appendChild(wrap); $('#aiBody').scrollTop=$('#aiBody').scrollHeight;
}
function aiGreet(){ aiMsg('bot', t('aiGreet')); }
async function aiSend(){
  const inp=$('#aiInput'); const x=inp.value.trim(); if(!x)return; inp.value='';
  aiMsg('me',x); aiHist.push({role:'user',content:x});
  const typ=document.createElement('div'); typ.className='msg bot'; typ.innerHTML='<span class="typing"><span></span><span></span><span></span></span>';
  $('#aiBody').appendChild(typ); $('#aiBody').scrollTop=$('#aiBody').scrollHeight;
  try{
    const r=await fetch('/api/chat',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({messages:aiHist,lang:LANG,mode:'customer'})});
    const d=await r.json(); typ.remove();
    const reply=d.reply||t('aiErr'); aiMsg('bot',reply); aiHist.push({role:'assistant',content:reply});
  }catch(e){ typ.remove(); aiMsg('bot',t('aiErr')); }
}

/* ============ VAKMAN / FACHOWIEC ============ */
let PRICE=null;
async function renderPro(){
  $('#main').innerHTML = `
    <div class="head"><h1>${t('pWelcome')}, ${ME.company||ME.name}</h1><p>${t('pIntro')}</p></div>
    <div class="kpi" id="kpi"></div>
    <div class="card"><h2>${t('leads')}</h2><div id="leads"></div></div>
    <div class="card" style="margin-top:22px"><h2>${t('billing')}</h2><div id="billing"></div></div>`;
  await loadLeads(); loadBilling(); handleReturn();
}
function kpiHtml(r){
  return `<div class="k"><div class="n">${r.creditsLeft}</div><div class="l">${t('kFree')}</div></div>
    <div class="k"><div class="n">${r.creditsUsed}</div><div class="l">${t('kUsed')}</div></div>
    <div class="k"><div class="n">${money(r.price.gross)}</div><div class="l">${t('kPrice')}</div></div>`;
}
async function loadLeads(){
  const r = await api('/api/leads'); PRICE=r.price;
  $('#kpi').innerHTML = kpiHtml(r);
  const el=$('#leads');
  if(!r.leads.length){ el.innerHTML=`<p class="empty">${t('leadsEmpty')}</p>`; return; }
  el.innerHTML = r.leads.map(l=>leadHtml(l, r.creditsLeft)).join('');
}
function leadHtml(l, creditsLeft){
  const contact = l.claimed
    ? `<div class="contact"><b>${l.name}</b> · ${l.phone||'—'} · ${l.email}</div>`
    : (creditsLeft>0
        ? `<button class="btn btn-gold btn-sm" onclick="claim('${l.id}',this)">${t('freeUnlock')} (${creditsLeft} ${t('over')})</button>`
        : `<button class="btn btn-gold btn-sm" onclick="claim('${l.id}',this)">${t('unlock')} — ${money(PRICE.gross)} ${t('incl')}</button>`);
  return `<div class="item" id="lead-${l.id}">
    <div class="top"><span class="svc">${l.service}</span>
      ${l.matchesSpec?`<span class="tag match">${t('match')}</span>`:''}
      ${l.claimed?`<span class="tag green">${t('unlocked')}</span>`:''}
      ${(!l.claimed && l.photoCount)?`<span class="tag">${l.photoCount} foto${l.photoCount>1?'s':''}</span>`:''}
      <span class="meta" style="margin-left:auto">${fmtDate(l.createdAt)}</span></div>
    <div class="desc">${l.description}</div><div class="meta">${l.zip||''}</div>
    ${(l.claimed && l.photos && l.photos.length)?`<div class="photo-thumbs" style="margin-top:10px">${l.photos.map(d=>`<a class="th" href="${d}" target="_blank" rel="noopener"><img src="${d}" alt=""></a>`).join('')}</div>`:''}
    <div style="margin-top:10px">${contact}</div></div>`;
}
async function claim(id, btn){
  btn.disabled=true; btn.textContent=t('busy');
  const r = await api('/api/leads/'+id+'/claim', { method:'POST', body:'{}' });
  if (r.ok){ refreshLead(id, r.lead); loadBilling(); reloadKpi(); return; }
  if (r.paymentRequired){
    btn.textContent=t('redirect');
    const c = await api('/api/leads/'+id+'/checkout', { method:'POST', body:'{}' });
    if (c.url){ location.href = c.url; return; }
    if (c.ok){ refreshLead(id, c.lead); loadBilling(); reloadKpi(); return; }
    btn.disabled=false; btn.textContent=t('retry');
  }
}
function refreshLead(id, lead){ const n=$('#lead-'+id); if(n) n.outerHTML=leadHtml(lead, 0); }
async function reloadKpi(){ const r=await api('/api/leads'); $('#kpi').innerHTML=kpiHtml(r); }
async function loadBilling(){
  const r = await api('/api/billing'); const el=$('#billing');
  const rows = r.claims.length ? r.claims.map((c,i)=>`
    <div class="item"><div class="top"><span class="svc">${c.service||'Lead'}</span>
      ${c.free?`<span class="tag green">${t('free')}</span>`:`<span class="tag">${money(c.gross)} ${t('incl')}</span>`}
      <span class="meta" style="margin-left:auto">${fmtDate(c.createdAt)}</span></div>
      ${c.free?'':`<div class="meta">${t('exclVat').replace('{net}',money(c.net)).replace('{vat}',money(c.vat))}</div>
      <button class="recpt" onclick='showReceipt(${JSON.stringify(c).replace(/'/g,"&#39;")})'>${t('receipt')}</button>`}
    </div>`).join('') : `<p class="empty">${t('bNone')}</p>`;
  el.innerHTML = `<div class="kpi">
      <div class="k"><div class="n">${r.creditsLeft}/${r.freeLeads}</div><div class="l">${t('bFree')}</div></div>
      <div class="k"><div class="n">${money(r.paidTotalGross)}</div><div class="l">${t('bPaid')}</div></div>
    </div>${rows}`;
}
function showReceipt(c){
  const w=window.open('','_blank'); if(!w)return;
  const dt = new Date(c.invoiceDate||c.createdAt).toLocaleDateString('nl-NL');
  const no = c.invoiceNo || '—';
  const buyer = [
    `<p><b>${ME.company||ME.name}</b></p>`,
    ME.address?`<p>${ME.address}</p>`:'',
    ME.city?`<p>${ME.city}</p>`:'',
    ME.nip?`<p>Btw-nummer: ${ME.nip}</p>`:'',
    `<p>${ME.email}</p>`
  ].join('');
  w.document.write(`<!DOCTYPE html><html lang="nl"><head><meta charset="UTF-8"><title>Factuur ${no}</title>
  <style>
  body{font-family:Arial,Helvetica,sans-serif;color:#1a1a1a;max-width:720px;margin:28px auto;padding:0 26px;line-height:1.55;font-size:14px}
  h1{font-size:1.5rem;margin:0 0 2px}
  .head{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid #C9A227;padding-bottom:10px;margin-bottom:18px}
  .head .meta{text-align:right;font-size:.85rem;color:#444}
  .parties{display:flex;gap:30px;margin:18px 0}.parties>div{flex:1}
  .parties b{display:block;margin-bottom:4px;color:#666;font-size:.8rem;text-transform:uppercase;letter-spacing:.5px}
  .parties p{margin:1px 0}
  table{width:100%;border-collapse:collapse;margin-top:16px;font-size:.86rem}
  th,td{border:1px solid #ddd;padding:7px 8px;text-align:right}
  th:nth-child(2),td:nth-child(2){text-align:left}
  th{background:#f6f1e3}
  .sum{margin-top:16px;margin-left:auto;width:300px}
  .sum .row{display:flex;justify-content:space-between;padding:3px 0}
  .sum .tot{border-top:2px solid #333;margin-top:6px;padding-top:6px;font-weight:bold;font-size:1.05rem}
  .pay{margin-top:18px;font-size:.9rem}.muted{color:#666}
  @media print{button{display:none}}
  </style></head><body>
  <div class="head">
    <div><h1>Factuur ${no}</h1><div class="muted">Budomatch</div></div>
    <div class="meta">Factuurdatum: ${dt}<br>Leverdatum: ${dt}</div>
  </div>
  <div class="parties">
    <div><b>Verkoper</b><p><b>${SELLER.name}</b></p><p>${SELLER.addr}</p><p>NIP: ${SELLER.nip}</p><p>REGON: ${SELLER.regon}</p><p>${SELLER.email}</p></div>
    <div><b>Koper</b>${buyer}</div>
  </div>
  <table>
    <tr><th>#</th><th>Omschrijving</th><th>Aantal</th><th>Stuksprijs</th><th>Netto</th><th>Btw</th><th>Btw-bedrag</th><th>Totaal</th></tr>
    <tr><td>1</td><td>Ontgrendeling lead${c.service?': '+c.service:''}</td><td>1</td><td>${money(c.net)}</td><td>${money(c.net)}</td><td>0%</td><td>${money(c.vat)}</td><td>${money(c.gross)}</td></tr>
  </table>
  <div class="sum">
    <div class="row"><span>Netto</span><span>${money(c.net)}</span></div>
    <div class="row"><span>Btw (verlegd) 0%</span><span>${money(c.vat)}</span></div>
    <div class="row tot"><span>Totaal</span><span>${money(c.gross)}</span></div>
  </div>
  <p class="muted" style="margin-top:14px">Btw verlegd naar de afnemer (reverse charge, art. 196 EU btw-richtlijn). De afnemer (ondernemer) voldoet de btw in eigen land.${ME.nip?'':' Btw-nummer afnemer vereist.'}</p>
  <div class="pay">
    <p>Betaalwijze: online betaling (iDEAL / Stripe)</p>
    <p><b>Voldaan: ${money(c.gross)}</b> — Te betalen: ${money(0)}</p>
  </div>
  <p style="margin-top:26px"><button onclick="window.print()" style="background:#C9A227;border:none;padding:10px 18px;border-radius:6px;cursor:pointer;font-weight:bold">${t('rcPrint')}</button></p>
  </body></html>`);
  w.document.close();
}
function toast(msg){ const el=document.createElement('div'); el.className='toast'; el.textContent=msg; document.body.appendChild(el); setTimeout(()=>el.remove(),4500); }
function handleReturn(){
  const q=new URLSearchParams(location.search);
  if(q.get('paid')){ toast(t('paidOk')); let n=0; const iv=setInterval(()=>{ loadLeads(); loadBilling(); if(++n>=3)clearInterval(iv); },1500); }
  else if(q.get('cancel')){ toast(t('payCancel')); }
  if(q.has('paid')||q.has('cancel')) history.replaceState({},'','/dashboard.html');
}
</script>
